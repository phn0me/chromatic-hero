name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # 1. Check Formatting (Workspace level)
      - name: Check Formatting
        run: cargo fmt --all -- --check

      # 2. Clippy (Game)
      - name: Clippy (Game)
        run: cargo clippy --manifest-path ./chromatic-hero/Cargo.toml -- -D warnings

      # 3. Run Tests (Game)
      - name: Test (Game)
        run: cargo test --manifest-path ./chromatic-hero/Cargo.toml

      - name: Build Release (Game)
        run: cargo build --release --manifest-path ./chromatic-hero/Cargo.toml --target-dir ./chromatic-hero/target

      - name: Upload Game Binary
        uses: actions/upload-artifact@v4
        with:
          name: chromatic-hero-linux
          path: chromatic-hero/target/release/chromatic-hero
          retention-days: 5
