jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Change directory to the project folder immediately
    defaults:
      run:
        working-directory: ./chromatic-hero

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Now these commands work automatically because we are already in the folder!
      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build Release
        run: cargo build --release

      - name: Upload Game Binary
        uses: actions/upload-artifact@v4
        with:
          name: chromatic-hero-linux
          # Note: The path now needs to account for the cd
          path: target/release/chromatic-hero
          retention-days: 5
